<!DOCTYPE html> <!-- Document type declaration for HTML5 -->
<html lang="en"> <!-- Root element, language set to English -->

<head> <!-- Container for page metadata -->
    <meta charset="UTF-8"> <!-- Character encoding set to UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Ensures proper rendering on mobile devices -->
    <title>Teacher Life</title> <!-- The title shown in the browser tab -->
    <link rel="stylesheet" href="style.css"> <!-- Links the external CSS stylesheet -->
    <style>
        /* Reseteo del body para eliminar bordes blancos y el scroll */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fff0f3;
        }
        /* Animaciones para la pantalla de inicio */
        @keyframes floatLogo {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-8px) scale(1.02); }
            100% { transform: translateY(0px) scale(1); }
        }
        @keyframes pulseBtn {
            0% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 77, 109, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0); }
        }
        #start-btn:hover {
            background-color: #c9184a !important;
            transform: scale(1.05);
        }
    </style>
</head> <!-- Closes the head section -->

<body> <!-- Starts the visible body content -->
    <!-- Botón de silenciar el audio global -->
    <div id="audio-controls" onclick="toggleAudio()" style="position: fixed; top: 20px; right: 20px; z-index: 10001; background: rgba(255, 255, 255, 0.9); border: 3px solid #ffccd5; border-radius: 50%; width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 6px rgba(89, 13, 34, 0.3); transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">
        <span id="mute-icon" style="font-size: 24px;">🔊</span>
    </div>

    <div id="intro-screen" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(255, 240, 243, 0.4); backdrop-filter: blur(4px); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000;">
        <img src="assets/images/logo.png" alt="Teacher Life Logo" style="width: 600px; max-width: 90%; margin-bottom: 40px; filter: drop-shadow(0 15px 25px rgba(89, 13, 34, 0.4)); animation: floatLogo 4.5s ease-in-out infinite;">
        <button id="start-btn" style="padding: 15px 50px; font-size: 22px; font-weight: bold; color: white; background-color: #ff4d6d; border: 4px solid #ffccd5; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; animation: pulseBtn 2s infinite;">Haz clic para empezar</button>
    </div> <!-- Closes the intro screen container -->
    <div id="city-screen" class="screen"> <!-- Container for the city map, visible en el fondo -->
        <h2 style="display:none;">City Map</h2> <!-- The title for the city view -->
        <div class="buildings-grid">
            <!-- Buttons removed -->
        </div> <!-- Closes the grid container -->
    </div> <!-- Closes the city screen container -->
    <div id="generic-building-screen" class="screen hidden"> <!-- Container for a standard building interior -->
        <button onclick="goBackToCity()" style="position: absolute; top: 20px; left: 20px; padding: 10px 20px; font-size: 16px; border-radius: 20px; z-index: 100;">Volver a la Ciudad</button>
        <div id="coins-display" style="position: absolute; top: 20px; right: 90px; background: #ff4d6d; color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 18px; border: 3px solid #ffccd5; box-shadow: 0 4px 6px rgba(89,13,34,0.3); z-index: 100;">Saldo: 200 €</div>
        <h2 id="building-title" style="color: #ff4d6d; text-align: center; margin-top: 20px; background: rgba(255, 240, 243, 0.8); padding: 10px; border-radius: 15px; display: inline-block;">Building</h2>
        <div id="building-content" style="margin: 20px auto; display: flex; flex-direction: column; align-items: center; gap: 15px; width: 95%;"></div>
    </div> <!-- Closes the generic building container -->
    <div id="apartment-screen" class="screen hidden"> <!-- Container for the apartment exterior/hallway -->
        <button onclick="goBackToCity()" style="position: absolute; top: 20px; left: 20px; padding: 10px 20px; font-size: 16px; border-radius: 20px; z-index: 100;">Volver a la Ciudad</button>
        <h2 style="color: #ff4d6d; text-align: center; margin-top: 20px; background: rgba(255, 240, 243, 0.8); padding: 10px; border-radius: 15px; display: inline-block;">Pasillo de Clases</h2>
        <div id="doors-container">
            <div class="door-wrapper" onclick="visitTeacher('LENGUAJE DE MARCAS')">
                <img src="assets/images/puerta.png" alt="LENGUAJE DE MARCAS" class="door-img">
            </div>
            <div class="door-wrapper" onclick="visitTeacher('ENTORNOS DE DESARROLLO')">
                <img src="assets/images/puerta.png" alt="ENTORNOS DE DESARROLLO" class="door-img">
            </div>
            <div class="door-wrapper" onclick="visitTeacher('SISTEMAS INFORMÁTICOS')">
                <img src="assets/images/puerta.png" alt="SISTEMAS INFORMÁTICOS" class="door-img">
            </div>
            <div class="door-wrapper" onclick="visitTeacher('BASE DE DATOS')">
                <img src="assets/images/puerta.png" alt="BASE DE DATOS" class="door-img">
            </div>
        </div>
    </div> <!-- Closes the apartment screen container -->
    <div id="teacher-screen" class="screen hidden" style="display: flex; flex-direction: row; padding: 0;"> <!-- Container for interacting with a specific teacher -->
        <!-- Menú Lateral Anclado a la Izquierda -->
        <div id="teacher-menu" style="width: 320px; min-width: 320px; height: 100vh; background: #fff0f3; border-right: 4px solid #ff4d6d; padding: 20px; box-shadow: 4px 0 20px rgba(89, 13, 34, 0.4); z-index: 100; display: flex; flex-direction: column; overflow-y: auto;">
            <h2 id="teacher-name" style="margin-top: 0; color: #590d22; text-align: center; border-bottom: 2px dashed #ffb3c1; padding-bottom: 10px;">Teacher Name</h2>
            <div style="text-align: center; font-weight: bold; color: #ff4d6d; margin-bottom: 15px; font-size: 18px;">
                Saldo: <span id="teacher-coins-display">200</span> €
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px;">
                <div>
                    <span style="font-weight: bold; color: #800f2f; font-size: 14px;">😊 Felicidad</span>
                    <div style="background: #ffccd5; border-radius: 10px; height: 12px; border: 2px solid #ff758f;">
                        <div id="happiness-bar" style="background: linear-gradient(90deg, #ff8fa3, #ff4d6d); height: 100%; border-radius: 8px; width: 50%; transition: width 0.3s ease;"></div>
                    </div>
                </div>
                <div>
                    <span style="font-weight: bold; color: #800f2f; font-size: 14px;">🍔 Hambre</span>
                    <div style="background: #ffb3c1; border-radius: 10px; height: 12px; border: 2px solid #c9184a;">
                        <div id="hunger-bar" style="background: linear-gradient(90deg, #ff4d6d, #a4133c); height: 100%; border-radius: 8px; width: 50%; transition: width 0.3s ease;"></div>
                    </div>
                </div>
            </div>
            <button onclick="talkToTeacher()" style="margin: 0 auto 10px auto; background-color: #ff8fa3; border-radius: 20px; padding: 10px 20px; border: 4px solid #ffccd5; box-shadow: 0 4px 6px rgba(89, 13, 34, 0.2); font-size: 18px; color: white; width: 100%; font-weight: bold;">💬 Hablar</button>
            
            <!-- Pestañas de inventario -->
            <div style="display: flex; gap: 10px; justify-content: center; border-top: 2px dashed #ffb3c1; padding-top: 15px; margin-bottom: 10px;">
                <button onclick="toggleInventory('food')" style="margin:0; font-size: 24px; padding: 10px; border-radius: 15px; background: white; border: 3px solid #ffccd5; flex: 1;">🍔</button>
                <button onclick="toggleInventory('gift')" style="margin:0; font-size: 24px; padding: 10px; border-radius: 15px; background: white; border: 3px solid #ffccd5; flex: 1;">🎁</button>
            </div>

            <!-- Vistas de inventario con Scroll vertical -->
            <div id="inventory-food-container" style="display: block; flex: 1; overflow-y: auto; background: rgba(255, 255, 255, 0.5); border-radius: 15px; padding: 10px; border: 2px solid #ffccd5;">
                <span style="font-weight: bold; color: #800f2f; font-size: 14px; display: block; margin-bottom: 10px; text-align: center;">Comida</span>
                <div id="inventory-food-bar" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;"></div>
            </div>
            <div id="inventory-gift-container" style="display: none; flex: 1; overflow-y: auto; background: rgba(255, 255, 255, 0.5); border-radius: 15px; padding: 10px; border: 2px solid #ffccd5;">
                <span style="font-weight: bold; color: #800f2f; font-size: 14px; display: block; margin-bottom: 10px; text-align: center;">Regalos</span>
                <div id="inventory-gift-bar" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;"></div>
            </div>

            <!-- Nueva pestaña de opciones de diálogo -->
            <div id="talk-options-container" style="display: none; flex: 1; flex-direction: column; gap: 8px; overflow-y: auto; background: rgba(255, 255, 255, 0.5); border-radius: 15px; padding: 10px; border: 2px solid #ffccd5;">
                <span style="font-weight: bold; color: #800f2f; font-size: 14px; display: block; margin-bottom: 5px; text-align: center;">¿Qué quieres decirle?</span>
                <div id="talk-options-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
            </div>
        </div>

        <!-- Área principal de juego donde se mueve el profesor -->
        <div id="game-area" style="flex-grow: 1; position: relative; overflow: hidden; height: 100vh; box-shadow: inset 0 0 50px rgba(0,0,0,0.5);">
            <!-- Barra superior con botones a la izquierda -->
            <div id="teacher-top-bar" style="position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 100;">
                <button onclick="leaveTeacher()" style="background-color: #ff4d6d; border-radius: 20px; font-weight: bold; border: 3px solid #ffccd5; box-shadow: 0 4px 6px rgba(89, 13, 34, 0.3); font-size: 16px; padding: 8px 20px; color: white; margin: 0;">Salir al pasillo</button>
                <button onclick="openRoomSelector()" style="background-color: #ff758f; border-radius: 20px; font-weight: bold; border: 3px solid #ffccd5; box-shadow: 0 4px 6px rgba(89, 13, 34, 0.3); font-size: 16px; padding: 8px 20px; color: white; margin: 0;">Elegir cuarto</button>
                <button onclick="openRoulette()" style="background-color: #ff8fa3; border-radius: 20px; font-weight: bold; border: 3px solid #ffccd5; box-shadow: 0 4px 6px rgba(89, 13, 34, 0.3); font-size: 16px; padding: 8px 20px; color: white; margin: 0;">🎰 ¿Descansito?</button>
            </div>

            <!-- Cabecera del profesor y asignatura -->
            <div id="teacher-header" style="position: absolute; top: 20px; width: 100%; text-align: center; z-index: 50; pointer-events: none;">
                <h1 id="teacher-title-display" style="color: #ff4d6d; background: rgba(255, 240, 243, 0.8); padding: 10px 20px; border-radius: 15px; display: inline-block; margin: 0; text-transform: uppercase;">NOMBRE - ASIGNATURA</h1>
            </div>

        <!-- Avatar del profesor que se moverá -->
        <div id="teacher-avatar" onmousedown="dragMouseDown(event)" ondrop="dropFood(event)" ondragover="allowDropFood(event)" style="position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%); transition: left 3s ease-in-out, top 0.4s cubic-bezier(0.5, 0, 1, 1); z-index: 50; display: flex; flex-direction: column; align-items: center;">
            <div id="teacher-bubble" style="opacity: 0; pointer-events: none; transition: opacity 0.3s; background: #fff0f3; border: 3px solid #ff4d6d; border-radius: 15px; padding: 12px 18px; box-shadow: 0 4px 8px rgba(89, 13, 34, 0.3); margin-bottom: 15px; max-width: 250px; text-align: center; font-weight: bold; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); z-index: 60; font-size: 14px; color: #590d22;">
                <div style="position: absolute; bottom: -11px; left: 50%; transform: translateX(-50%); border-width: 8px 8px 0; border-style: solid; border-color: #ff4d6d transparent transparent transparent;"></div>
                <div style="position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%); border-width: 6px 6px 0; border-style: solid; border-color: #fff0f3 transparent transparent transparent;"></div>
                <span id="teacher-bubble-text" style="color: #590d22;"></span>
            </div>
            <img id="avatar-img" src="" alt="teacher" style="max-height: 280px; width: auto; transform: scaleX(var(--flip, 1)); transition: transform 0.4s;">
        </div>
        <!-- Contenedor para el regalo activo -->
        <div id="gift-container" style="position: absolute; z-index: 55; pointer-events: none; transition: left 3s ease-in-out;"></div>
        </div> <!-- Cierra game-area -->
    </div> <!-- Closes the teacher screen container -->
    
    <!-- Pantalla de viaje en grupo / interacciones -->
    <div id="hangout-screen" class="screen hidden" style="position: relative; overflow: hidden; height: 100vh; padding: 0;">
        <button onclick="leaveHangout()" style="position: absolute; top: 20px; left: 20px; z-index: 100; background-color: #ff4d6d; border-radius: 20px; font-weight: bold; border: 3px solid #ffccd5; box-shadow: 0 4px 6px rgba(89, 13, 34, 0.3); font-size: 16px; padding: 8px 20px; color: white; margin: 0;">Volver a la Ciudad</button>
        <div style="position: absolute; top: 20px; width: 100%; text-align: center; z-index: 50; pointer-events: none;">
            <h1 id="hangout-title" style="color: #ff4d6d; background: rgba(255, 240, 243, 0.8); padding: 10px 20px; border-radius: 15px; display: inline-block; margin: 0; text-transform: uppercase;">DESTINO</h1>
        </div>
        <div id="hangout-avatars-container" style="position: absolute; bottom: 0; width: 100%; height: 100%;"></div>
    </div>

    <div id="travel-transition" class="hidden" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(255, 77, 109, 0.95); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; font-size: 30px; font-weight: bold;">
        <div style="font-size: 100px; margin-bottom: 20px; animation: wobbling 1s infinite ease-in-out;">🚌</div>
        Viajando...
    </div>
    <script src="js/data.js"></script> <!-- Carga los datos de los objetos y profesores -->
    <script src="js/globals.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/city.js"></script>
    <script src="js/apartment.js"></script>
    <script src="js/shop.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/teacher.js"></script>
</body> <!-- Closes the body element -->

</html> <!-- Closes the HTML document -->
